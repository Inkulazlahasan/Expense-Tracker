<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Expense Tracker</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 40px;
    }

    .box {
      max-width: 420px;
      border: 1px solid #ddd;
      border-radius: 10px;
      padding: 20px;
    }

    .row {
      display: flex;
      gap: 10px;
      margin-bottom: 14px;
    }

    input {
      flex: 1;
      padding: 8px 10px;
      font-size: 16px;
    }

    button {
      padding: 8px 14px;
      cursor: pointer;
    }

    #total {
      font-weight: bold;
      color: #0a7d28;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Expense Tracker</h1>

    <form id="expenseForm" class="row">
      <input id="amountInput" type="text" placeholder="Enter amount" />
      <button id="addBtn" type="submit">Add</button>
    </form>

    <p>Total Expense: <span id="total">0</span> Tk</p>
  </div>

  <script src="app.js"></script>
</body>
</html>
